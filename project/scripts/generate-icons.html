<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Call - App Icon Generator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 40px;
      background: #f1f5f9;
    }
    .icon-set {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .icon-item {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .icon-item canvas {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }
    .icon-item p {
      margin: 10px 0 5px;
      font-weight: 600;
    }
    .icon-item span {
      color: #64748b;
      font-size: 12px;
    }
    h1 { color: #1B3A5C; }
    h2 { color: #334155; margin-top: 30px; }
    button {
      padding: 12px 24px;
      background: #C9972C;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover { background: #a87d1f; }
  </style>
</head>
<body>
  <h1>One Call Home Solutions - Icon Generator</h1>
  <p>Download all app icons for Android, iOS, and Play Store</p>

  <button onclick="downloadAll()">Download All Icons</button>
  <button onclick="downloadPlayStore()">Download Play Store Assets</button>

  <h2>Android Launcher Icons</h2>
  <div id="androidIcons" class="icon-set"></div>

  <h2>Play Store Assets</h2>
  <div id="playStoreIcons" class="icon-set"></div>

  <h2>Splash Screen</h2>
  <div id="splashScreen" class="icon-set"></div>

  <script>
    const COLORS = {
      primary: '#1B3A5C',
      primaryLight: '#2a4d73',
      accent: '#C9972C',
      white: '#ffffff',
      gray: '#64748b'
    };

    function drawIcon(ctx, size) {
      const scale = size / 512;

      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, COLORS.primary);
      gradient.addColorStop(1, COLORS.primaryLight);

      // Round rect background
      ctx.fillStyle = gradient;
      roundRect(ctx, 0, 0, size, size, size * 0.12);
      ctx.fill();

      // Phone icon
      const phoneX = size * 0.28;
      const phoneY = size * 0.22;
      const phoneW = size * 0.35;
      const phoneH = size * 0.48;

      ctx.fillStyle = COLORS.white;
      ctx.globalAlpha = 0.95;
      roundRect(ctx, phoneX, phoneY, phoneW, phoneH, size * 0.04);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Screen
      ctx.fillStyle = '#f1f5f9';
      roundRect(ctx, phoneX + size * 0.03, phoneY + size * 0.06, phoneW - size * 0.06, phoneH - size * 0.12, size * 0.015);
      ctx.fill();

      // Home text
      ctx.fillStyle = COLORS.primary;
      ctx.font = `bold ${size * 0.08}px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('ONE CALL', size / 2, size * 0.82);

      ctx.fillStyle = COLORS.accent;
      ctx.font = `${size * 0.035}px Arial, sans-serif`;
      ctx.fillText('Home Solutions', size / 2, size * 0.89);
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function createIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      drawIcon(ctx, size);
      return canvas;
    }

    function drawSplash(ctx, width, height) {
      // Background
      ctx.fillStyle = COLORS.primary;
      ctx.fillRect(0, 0, width, height);

      // Logo center
      const logoSize = Math.min(width, height) * 0.4;
      const logoCanvas = createIcon(logoSize);
      const logoCtx = logoCanvas.getContext('2d');
      logoCtx.clearRect(0, 0, logoSize, logoSize);

      // Draw just the icon part without background
      drawIcon(logoCtx, logoSize);

      ctx.drawImage(logoCanvas, (width - logoSize) / 2, (height - logoSize) / 2 - 40);

      // Text
      ctx.fillStyle = COLORS.white;
      ctx.font = `bold ${Math.min(width, height) * 0.06}px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('ONE CALL', width / 2, (height + logoSize) / 2 + 20);

      ctx.fillStyle = COLORS.accent;
      ctx.font = `${Math.min(width, height) * 0.025}px Arial, sans-serif`;
      ctx.fillText('Home Solutions', width / 2, (height + logoSize) / 2 + 50);
    }

    // Android icon sizes
    const androidSizes = {
      'mipmap-mdpi': 48,
      'mipmap-hdpi': 72,
      'mipmap-xhdpi': 96,
      'mipmap-xxhdpi': 144,
      'mipmap-xxxhdpi': 192,
      'play-store': 512
    };

    // Generate icons
    window.onload = function() {
      const androidDiv = document.getElementById('androidIcons');
      Object.entries(androidSizes).forEach(([name, size]) => {
        const canvas = createIcon(size);
        const div = document.createElement('div');
        div.className = 'icon-item';
        div.innerHTML = `<p>${name}</p><span>${size}x${size}px</span>`;
        div.insertBefore(canvas, div.firstChild.nextSibling);
        androidDiv.appendChild(div);
      });

      // Play Store
      const playDiv = document.getElementById('playStoreIcons');

      // Feature graphic
      const featureCanvas = document.createElement('canvas');
      featureCanvas.width = 1024;
      featureCanvas.height = 500;
      const fCtx = featureCanvas.getContext('2d');
      drawSplash(fCtx, 1024, 500);
      const fDiv = document.createElement('div');
      fDiv.className = 'icon-item';
      fDiv.innerHTML = '<p>Feature Graphic</p><span>1024x500px</span>';
      fDiv.insertBefore(featureCanvas, fDiv.firstChild.nextSibling);
      playDiv.appendChild(fDiv);

      // Splash screens
      const splashDiv = document.getElementById('splashScreen');
      const splashSizes = [
        { name: 'splash-landscape', w: 1280, h: 720 },
        { name: 'splash-portrait', w: 720, h: 1280 }
      ];
      splashSizes.forEach(({ name, w, h }) => {
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        drawSplash(ctx, w, h);
        const div = document.createElement('div');
        div.className = 'icon-item';
        div.innerHTML = `<p>${name}</p><span>${w}x${h}px</span>`;
        div.insertBefore(canvas, div.firstChild.nextSibling);
        splashDiv.appendChild(div);
      });
    };

    function downloadAll() {
      alert('Right-click on each icon and select "Save image as..." to download.');
    }

    function downloadPlayStore() {
      alert('Right-click on each asset and select "Save image as..." to download.');
    }
  </script>
</body>
</html>

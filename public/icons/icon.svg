<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A5C"/>
      <stop offset="100%" style="stop-color:#2a4d73"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>

  <!-- Phone Icon -->
  <g transform="translate(100, 80)">
    <!-- Phone body -->
    <rect x="60" y="20" width="180" height="320" rx="24" fill="#ffffff" opacity="0.95"/>

    <!-- Phone screen -->
    <rect x="75" y="50" width="150" height="260" rx="8" fill="#f1f5f9"/>

    <!-- Phone speaker -->
    <rect x="130" y="30" width="40" height="6" rx="3" fill="#334155"/>

    <!-- Home button -->
    <circle cx="150" cy="320" r="12" fill="none" stroke="#334155" stroke-width="3"/>

    <!-- Service icons on screen -->
    <g transform="translate(85, 60)">
      <!-- Wrench icon -->
      <path d="M30 10 L30 50 L40 50 L40 60 L10 60 L10 50 L20 50 L20 10 L30 10 Z" fill="#1B3A5C"/>

      <!-- Star icon -->
      <path d="M90 15 L95 30 L110 30 L98 40 L103 55 L90 45 L77 55 L82 40 L70 30 L85 30 Z" fill="#C9972C"/>

      <!-- Check icon -->
      <path d="M130 20 L140 35 L160 10" fill="none" stroke="#10b981" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- ONE CALL text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">ONE CALL</text>

  <!-- Tagline -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="20" fill="#C9972C" text-anchor="middle">Home Solutions</text>
</svg>
